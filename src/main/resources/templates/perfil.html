<html th:replace="~{global :: plantilla(~{::main})}"
	xmlns:th="https://www.thymeleaf.org">
<main>
	<h1 class="m-3 mb-4">Perfil</h1>
	<div class="card-body m-3">
		<div class="row">
			<div class="col">
				<p class="mb-0">Nombre</p>
			</div>
			<div class="col">
				<p class="text-muted mb-0" th:text="${usuario.persona.nombre}"></p>
			</div>
		</div>
		<hr>
		<div class="row">
			<div class="col">
				<p class="mb-0">Apellido</p>
			</div>
			<div class="col">
				<p class="text-muted mb-0" th:text="${usuario.persona.apellido}"></p>
			</div>
		</div>
		<hr>
		<div class="row">
			<div class="col">
				<p class="mb-0">Número de telefono</p>
			</div>
			<div class="col">
				<p class="text-muted mb-0" th:text="${usuario.persona.telefono}"></p>
			</div>
		</div>
		<hr>
		<div class="row">
			<div class="col">
				<p class="mb-0">Correo electrónico / usuario</p>
			</div>
			<div class="col	">
				<p class="text-muted mb-0" th:text="${usuario.email}"></p>
			</div>
		</div>
	</div>
	<div class="card-body">
		<h3 class="m-3 mt-4">Reservas</h3>
		<div class="row m-2">
			<div class="card w-25 m-2 p-0"
				th:each="reserva : ${usuario.persona.reservas}">
				<div class="card-header col">
					Reserva del <span th:text="${reserva.habitacion.hotel.nombre}"></span>
				</div>
				<ul class="list-group list-group-flush">
					<li class="list-group-item">Fecha Llegada: <span
						th:text="${reserva.fechaInicio}"></span></li>
					<li class="list-group-item">Fecha Salida: <span
						th:text="${reserva.fechaFin}"></span></li>
					<li class="list-group-item">Precio: <span
						th:text="${reserva.habitacion.precio}"></span></li>
				</ul>
			</div>
		</div>
	</div>
</main>
