<html th:replace="~{global :: plantilla(~{::main})}"
	xmlns:th="https://www.thymeleaf.org">
<main>
	<h1 class="m-3">Registrar usuario</h1>
	<form th:action="@{/signin}" th:object="${registroDto}" method="post" class="m-3">
		<div class="form-group">
			<label class="my-2">Tu nombre</label>
			<input type="text" th:field="*{nombre}" class="form-control" required>
		<div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
		</div>
		<div class="form-group">
			<label class="my-2">Tu primer apellido</label>
			<input type="text" th:field="*{apellido}" class="form-control" required>
			<div class="text-danger" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
		</div>
		<div class="form-group">
			<label class="my-2">Número de teléfono</label>
			<input type="text" th:field="*{telefono}" class="form-control" required>
			<div class="text-danger" th:if="${#fields.hasErrors('*{telefono}')}" th:errors="*{telefono}"></div>
		</div>
		<div class="form-group">
			<label class="my-2">Tu correo electrónico</label>
			<input type="email" th:field="*{email}" class="form-control" required>
			<div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
		</div>
		<div class="row">
			<div class="col">
				<label class="my-2">Contraseña</label>
				<input type="password" th:field="*{password}" class="form-control" required>
				<div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
			</div>
			<div class="col">
				<label class="my-2">Repite la contraseña</label>
				<input type="password" th:field="*{confirmPassword}" class="form-control" required>
				<div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
			</div>
		</div>
		<div th:if="${msg}" class="form-group">
			<p th:text="${msg}" class="mt-2 mb-0 text-success"></p>
		</div>
		<div th:if="${error}" class="form-group">
			<p th:text="${error}" class="mt-2 mb-0 text-danger"></p>
		</div>
		<button type="submit" class="btn btn-primary mt-3">Registrarse</button>
	</form>
</main>
