<html th:replace="~{global :: plantilla(~{::main})}"
	xmlns:th="https://www.thymeleaf.org">
<main>
	<h1 class="m-3 mb-4">Listado de hoteles</h1>
	<div class="card m-3 hover-zoom" th:each="hotel : ${hoteles}">
		<div class="card-body">
			<h5 class="card-title" th:text="${hotel.nombre}"></h5>
			<p class="card-text" th:text="${hotel.direccion}"></p>
			<p class="card-text">
				<small class="text-muted">0 estrellas</small>
			</p>
		</div>
		<img th:src="${hotel.fotos[0]}" style="height: 200px; object-fit: cover;" class="card-img-bottom" alt="Imagen del hotel">
	</div>
</main>
